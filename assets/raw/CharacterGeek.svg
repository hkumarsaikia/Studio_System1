<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400">
    <g id="CharacterGroup">
        <!-- Body -->
        <rect x="70" y="150" width="60" height="120" rx="30" fill="#38bdf8" stroke="#1e293b" stroke-width="2.5"/>
        <!-- Dynamic Belt -->
        <rect x="70" y="240" width="60" height="10" fill="#1e293b"/>
        
        <!-- Arms -->
        <path d="M70,180 C40,200 40,250 50,280" fill="none" stroke="#38bdf8" stroke-width="20" stroke-linecap="round"/>
        <path d="M130,180 C160,200 160,250 150,280" fill="none" stroke="#38bdf8" stroke-width="20" stroke-linecap="round"/>
        
        <!-- Hands -->
        <circle cx="50" cy="280" r="15" fill="#f1c27d" stroke="#1e293b" stroke-width="2.5"/>
        <circle cx="150" cy="280" r="15" fill="#f1c27d" stroke="#1e293b" stroke-width="2.5"/>
        
        <!-- Legs -->
        <rect x="80" y="270" width="15" height="100" rx="7.5" fill="#f1c27d" stroke="#1e293b" stroke-width="2.5"/>
        <rect x="105" y="270" width="15" height="100" rx="7.5" fill="#f1c27d" stroke="#1e293b" stroke-width="2.5"/>
        
        <!-- Feet -->
        <path d="M70,370 L95,370 C95,360 85,355 70,360 Z" fill="#2d2d2d"/>
        <path d="M105,370 L130,370 C130,360 120,355 105,360 Z" fill="#2d2d2d"/>
        
        <!-- Head -->
        <circle cx="100" cy="100" r="45" fill="#f1c27d" stroke="#1e293b" stroke-width="2.5"/>

        <!-- Hair Spiky -->
        <path d="M 55 90 L 60 50 L 75 70 L 90 30 L 110 70 L 125 40 L 140 80 A 45 45 0 0 0 55 90 Z" fill="#4a4a4a" stroke="#1e293b" stroke-width="2.5"/>

        <!-- Eyes -->
        <path d="M85,95 Q90,85 95,95" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
        <path d="M105,95 Q110,85 115,95" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
        <!-- Mouth -->
        <path d="M90,115 Q100,130 110,115" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>

        <!-- Glasses -->
        <rect x="75" y="85" width="20" height="15" rx="3" fill="none" stroke="#000" stroke-width="3"/>
        <rect x="105" y="85" width="20" height="15" rx="3" fill="none" stroke="#000" stroke-width="3"/>
        <line x1="95" y1="92" x2="105" y2="92" stroke="#000" stroke-width="2"/>
        <line x1="75" y1="92" x2="55" y2="92" stroke="#000" stroke-width="2"/>
        <line x1="125" y1="92" x2="145" y2="92" stroke="#000" stroke-width="2"/>

    </g>
</svg>