    </g>
    <!-- Minor accent details -->
    <circle
       cx="200"
       cy="200"
       r="10"
       fill="#fbbf24"
       id="circle5" />
    <circle
       cx="600"
       cy="600"
       r="10"
       fill="#fbbf24"
       id="circle6" />
  </g>
</svg>
