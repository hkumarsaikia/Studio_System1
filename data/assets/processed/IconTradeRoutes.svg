<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 800 800"
   version="1.1"
   id="svg8"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <defs
     id="defs4">
    <radialGradient
       id="glowGrad_route"
       cx="50%"
       cy="50%"
       r="50%">
      <stop
         offset="0%"
         stop-color="#22c55e"
         stop-opacity="0.3"
         id="stop1" />
      <stop
         offset="100%"
         stop-color="#22c55e"
         stop-opacity="0"
         id="stop2" />
    </radialGradient>
    <linearGradient
       id="baseGrad_route"
       x1="0%"
       y1="0%"
       x2="100%"
       y2="100%">
      <stop
         offset="0%"
         stop-color="#334155"
         id="stop3" />
      <stop
         offset="100%"
         stop-color="#0f172a"
         id="stop4" />
    </linearGradient>
  </defs>
  <g
     id="route-container">
    <!-- Floating Base Tile -->
    <rect
       x="100"
       y="100"
       width="600"
       height="600"
       rx="120"
       fill="url(#baseGrad_route)"
       stroke="#1e293b"
       stroke-width="2.5"
       id="rect4" />
    <!-- Glow backing behind the icon -->
    <circle
       cx="400"
       cy="400"
       r="250"
       fill="url(#glowGrad_route)"
       id="circle4" />
    <!-- The actual Lucide icon, scaled up -->
    <g
       transform="translate(160, 160) scale(20)"
       fill="none"
       stroke="#22c55e"
       stroke-width="1.5"
       stroke-linecap="round"
       stroke-linejoin="round"
       id="g6">
      <circle
         cx="6"
         cy="19"
         r="3"
         id="circle5" />
      <path
         d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"
         id="path5" />
      <circle
         cx="18"
         cy="5"
         r="3"
         id="circle6" />
    </g>
    <!-- Minor accent details -->
    <circle
       cx="200"
       cy="200"
       r="10"
       fill="#22c55e"
       id="circle7" />
    <circle
       cx="600"
       cy="600"
       r="10"
       fill="#22c55e"
       id="circle8" />
  </g>
</svg>
