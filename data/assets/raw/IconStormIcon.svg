<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
    <defs>
        <radialGradient id="glowGrad_cloud-lightning" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.3" />
            <stop offset="100%" stop-color="#fbbf24" stop-opacity="0" />
        </radialGradient>
        <linearGradient id="baseGrad_cloud-lightning" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#334155" />
            <stop offset="100%" stop-color="#0f172a" />
        </linearGradient>
    </defs>
    <g id="cloud-lightning-container">
        <!-- Floating Base Tile -->
        <rect x="100" y="100" width="600" height="600" rx="120" fill="url(#baseGrad_cloud-lightning)" stroke="#1e293b" stroke-width="2.5"/>
        
        <!-- Glow backing behind the icon -->
        <circle cx="400" cy="400" r="250" fill="url(#glowGrad_cloud-lightning)"/>

        <!-- The actual Lucide icon, scaled up -->
        <g transform="translate(160, 160) scale(20)" 
           fill="none" 
           stroke="#fbbf24" 
           stroke-width="1.5" 
           stroke-linecap="round" 
           stroke-linejoin="round">
            <path d="M6 16.326A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 .5 8.973" />
  <path d="m13 12-3 5h4l-3 5" />
        </g>
        
        <!-- Minor accent details -->
        <circle cx="200" cy="200" r="10" fill="#fbbf24"/>
        <circle cx="600" cy="600" r="10" fill="#fbbf24"/>
    </g>
</svg>