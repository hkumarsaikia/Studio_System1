<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
    <defs>
        <radialGradient id="glowGrad_droplets" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3" />
            <stop offset="100%" stop-color="#a78bfa" stop-opacity="0" />
        </radialGradient>
        <linearGradient id="baseGrad_droplets" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#334155" />
            <stop offset="100%" stop-color="#0f172a" />
        </linearGradient>
    </defs>
    <g id="droplets-container">
        <!-- Floating Base Tile -->
        <rect x="100" y="100" width="600" height="600" rx="120" fill="url(#baseGrad_droplets)" stroke="#1e293b" stroke-width="2.5"/>
        
        <!-- Glow backing behind the icon -->
        <circle cx="400" cy="400" r="250" fill="url(#glowGrad_droplets)"/>

        <!-- The actual Lucide icon, scaled up -->
        <g transform="translate(160, 160) scale(20)" 
           fill="none" 
           stroke="#a78bfa" 
           stroke-width="1.5" 
           stroke-linecap="round" 
           stroke-linejoin="round">
            <path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z" />
  <path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97" />
        </g>
        
        <!-- Minor accent details -->
        <circle cx="200" cy="200" r="10" fill="#a78bfa"/>
        <circle cx="600" cy="600" r="10" fill="#a78bfa"/>
    </g>
</svg>