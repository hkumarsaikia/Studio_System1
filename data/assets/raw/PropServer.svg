<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400">
    <g id="PropGroup">

        <!-- Base Cabinet -->
        <rect x="40" y="50" width="120" height="300" rx="10" fill="#334155" stroke="#1e293b" stroke-width="2.5"/>
        <!-- Shadow -->
        <rect x="50" y="60" width="100" height="280" rx="5" fill="#1e293b"/>
        
        <!-- Server Units -->
        <rect x="55" y="70" width="90" height="40" rx="3" fill="#cbd5e1" stroke="#1e293b" stroke-width="2.5"/>
        <rect x="55" y="120" width="90" height="40" rx="3" fill="#cbd5e1" stroke="#1e293b" stroke-width="2.5"/>
        <rect x="55" y="170" width="90" height="40" rx="3" fill="#cbd5e1" stroke="#1e293b" stroke-width="2.5"/>
        <rect x="55" y="220" width="90" height="40" rx="3" fill="#cbd5e1" stroke="#1e293b" stroke-width="2.5"/>
        <rect x="55" y="270" width="90" height="40" rx="3" fill="#cbd5e1" stroke="#1e293b" stroke-width="2.5"/>
        
        <!-- Blinking Lights -->
        <circle cx="70" cy="90" r="5" fill="#a78bfa"/>
        <circle cx="90" cy="90" r="5" fill="#ef4444"/>
        
        <circle cx="70" cy="140" r="5" fill="#a78bfa"/>
        <circle cx="90" cy="140" r="5" fill="#a78bfa"/>
        
        <circle cx="70" cy="190" r="5" fill="#f59e0b"/>
        <circle cx="90" cy="190" r="5" fill="#a78bfa"/>
        
        <circle cx="70" cy="240" r="5" fill="#a78bfa"/>
        <circle cx="90" cy="240" r="5" fill="#a78bfa"/>
        
        <circle cx="70" cy="290" r="5" fill="#a78bfa"/>
        <circle cx="90" cy="290" r="5" fill="#ef4444"/>

    </g>
</svg>